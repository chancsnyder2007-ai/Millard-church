<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millard Church</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Responsive gallery styles */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Millard Church</h1>
    </header>
    <section class="gallery">
        <img src="https://via.placeholder.com/250?text=Image+1" alt="Placeholder Image 1">
        <img src="https://via.placeholder.com/250?text=Image+2" alt="Placeholder Image 2">
        <img src="https://via.placeholder.com/250?text=Image+3" alt="Placeholder Image 3">
        <img src="https://via.placeholder.com/250?text=Image+4" alt="Placeholder Image 4">
    </section>
</body>
</html>
